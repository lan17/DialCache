name: Release

on: workflow_dispatch

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # contents: write pushes the release tag and GitHub release;
    # id-token: write mints the OIDC token for npm trusted publishing.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.33.0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Verify release source
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Release workflow must be run from main; got $GITHUB_REF" >&2
            exit 1
          fi

          git fetch --force origin main:refs/remotes/origin/main --tags
          remote_main="$(git rev-parse origin/main)"
          if [[ "$GITHUB_SHA" != "$remote_main" ]]; then
            echo "Release source $GITHUB_SHA is not current origin/main $remote_main" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 25.0.7
          extra_plugins: conventional-changelog-conventionalcommits@9.3.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
