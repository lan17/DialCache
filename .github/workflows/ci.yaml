name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm test:integration
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
          cache: "pnpm"
      - run: pnpm test:package

  # Keep the previously required context alive until this rename lands and
  # branch protection can be migrated without weakening checks on current main.
  legacy-required-check:
    name: gcache-ts
    needs: test
    runs-on: ubuntu-latest
    steps:
      - run: echo "DialCache CI passed"
